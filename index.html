/* ---------- Anthropic API ---------- */
async function callClaude(apiKey, prompt) {
  if (!apiKey) throw new Error("NO_API_KEY");
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "content-type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 2000,
      messages: [{ role: "user", content: prompt }],
      tools: [{ type: "web_search_20250305", name: "web_search", max_uses: 3 }],
    }),
  });
  if (response.status === 401 || response.status === 403) throw new Error("BAD_API_KEY");
  if (!response.ok) throw new Error("API_ERROR");
  const data = await response.json();
  const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n");
  const clean = text.replace(/```json|```/g, "").trim();
  const start = clean.indexOf("{"), end = clean.lastIndexOf("}");
  if (start === -1 || end === -1) throw new Error("PARSE_ERROR");
  return JSON.parse(clean.slice(start, end + 1));
}

const searchProducts = (apiKey, query) => callClaude(apiKey, `You are a Games Workshop / Warhammer product catalog search. The user gives a search term, possibly partial, possibly in Finnish. List ALL current and recent Games Workshop boxed miniature products that match the term (e.g. "High Elf" should list every High Elves box you can find: battalion boxes, unit boxes, characters, etc.). Use web search to check the current Games Workshop catalog if needed.

Search term: "${query}"

Respond ONLY with valid JSON, no markdown fences, no other text. Schema:
{"found": true, "matches": [{"product": "Official product name", "system": "...", "faction": "Faction name"}]}

Rules:
- List up to 12 matches, most relevant first.
- "system" MUST be exactly one of: ${SYSTEMS.filter(s => s !== "Muu").map(s => `"${s}"`).join(", ")}. If unsure, pick the closest.
- Only physical miniature products (boxes, blisters), not paints, books or accessories.
- If nothing matches: {"found": false}`);

const fetchProductContents = (apiKey, productName, system) => callClaude(apiKey, `You are a Games Workshop / Warhammer product content lookup. Find EXACTLY what individual miniatures the following boxed product contains. Use web search to verify the box contents.

Product: "${productName}" (game system: ${system})

Respond ONLY with valid JSON, no markdown fences, no other text. Schema:
{"found": true, "units": [{"name": "Unit or model name", "count": 10}]}

Rules:
- "count" is the number of individual physical miniatures of that type in the box.
- Split different model types into separate entries (e.g. 1 character + 10 infantry + 3 bikes = 3 entries).
- Unit names in English (official names).
- If contents cannot be determined: {"found": false}`);

/* ---------- Motivaatioviestit ---------- */
function motivationLine(pct, total, done, name) {
  if (total === 0) return "Lisää ensimmäinen tuote ja urakka alkaa.";
  if (pct >= 100) return "Koko urakka valmis. Pöytä odottaa — For the Emperor!";
  if (pct >= 90) return "Loppusuora häämöttää. Viimeiset vedot!";
  if (pct >= 75) return "Kolme neljäsosaa takana. Armeija alkaa hohtaa.";
  if (pct >= 50) return "Puoliväli ohitettu! Momentum on puolellasi.";
  if (pct >= 25) return "Neljännes valmiina. Harmaa vuori kutistuu.";
  if (done > 0) return `${done} miniä valmiina. Jokainen sivellinveto vie eteenpäin.`;
  return "Harmaa legioona odottaa. Yksi mini kerrallaan.";
}

/* ============================================================
   KIRJAUTUMISNÄKYMÄ
   ============================================================ */
function AuthScreen() {
  const [mode, setMode] = useState("in"); // in | up
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [name, setName] = useState("");
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState(null);
  const [err, setErr] = useState(null);
  const [known, setKnown] = useState([]);

  useEffect(() => {
    try { setKnown(JSON.parse(localStorage.getItem(KNOWN_EMAILS_KEY) || "[]")); } catch (e) {}
  }, []);

  const rememberEmail = (e) => {
    try {
      const list = JSON.parse(localStorage.getItem(KNOWN_EMAILS_KEY) || "[]");
      if (!list.includes(e)) localStorage.setItem(KNOWN_EMAILS_KEY, JSON.stringify([...list, e]));
    } catch (x) {}
  };

  const forgetEmail = (e) => {
    const list = known.filter(x => x !== e);
    setKnown(list);
    localStorage.setItem(KNOWN_EMAILS_KEY, JSON.stringify(list));
  };

  const submit = async () => {
    if (busy || !email.trim() || !password) return;
    setBusy(true); setErr(null); setMsg(null);
    try {
      if (mode === "up") {
        const { data, error } = await supa.auth.signUp({
          email: email.trim(),
          password,
          options: { data: { display_name: name.trim() || email.split("@")[0] } },
        });
        if (error) throw error;
        rememberEmail(email.trim());
        if (!data.session) setMsg("Profiili luotu. Vahvista sähköpostiosoite viestistä ja kirjaudu sitten sisään.");
      } else {
        const { error } = await supa.auth.signInWithPassword({ email: email.trim(), password });
        if (error) throw error;
        rememberEmail(email.trim());
      }
    } catch (e) {
      const m = (e.message || "").toLowerCase();
      if (m.includes("invalid login")) setErr("Sähköposti tai salasana ei täsmää.");
      else if (m.includes("already registered")) setErr("Tällä sähköpostilla on jo profiili. Kirjaudu sisään.");
      else if (m.includes("password")) setErr("Salasanan pitää olla vähintään 6 merkkiä.");
      else setErr(e.message || "Kirjautuminen epäonnistui.");
    }
    setBusy(false);
  };

  return (
    <div style={{ minHeight: "100vh", background: "#17130f", color: "#d9d2c5", fontFamily: "'Alegreya Sans', system-ui, sans-serif", display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
      <div className="card-in" style={{ width: "100%", maxWidth: 380 }}>
        <div style={{ textAlign: "center", marginBottom: 22 }}>
          <div style={{ fontFamily: "'Cinzel', serif", fontSize: 12, letterSpacing: "0.35em", color: "#9c7c34", textTransform: "uppercase" }}>Maalausurakka</div>
          <h1 style={{ fontFamily: "'Cinzel', serif", fontSize: 26, fontWeight: 700, color: "#efe6d3", margin: "4px 0 0" }}>
            {mode === "in" ? "Kirjaudu sisään" : "Luo profiili"}
          </h1>
        </div>

        <div style={{ background: "#211b15", border: "1px solid #3a2f22", borderRadius: 12, padding: 16, display: "flex", flexDirection: "column", gap: 10 }}>
          {mode === "up" && (
            <input value={name} onChange={e => setName(e.target.value)} placeholder="Profiilin nimi (esim. Jani)" style={S.input} />
          )}
          <input type="email" autoComplete="username" value={email} onChange={e => setEmail(e.target.value)} placeholder="Sähköposti" style={S.input} />
          <input type="password" autoComplete={mode === "up" ? "new-password" : "current-password"} value={password}
            onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key === "Enter" && submit()}
            placeholder="Salasana" style={S.input} />

          <button onClick={submit} disabled={busy} style={{ ...S.gold, opacity: busy ? 0.6 : 1, cursor: busy ? "wait" : "pointer" }}>
            {busy ? "Hetki…" : mode === "in" ? "Kirjaudu" : "Luo profiili"}
          </button>

          {err && <p style={{ color: "#d98a8a", fontSize: 13, margin: 0 }}>{err}</p>}
          {msg && <p style={{ color: "#8fae7a", fontSize: 13, margin: 0 }}>{msg}</p>}

          <button onClick={() => { setMode(mode === "in" ? "up" : "in"); setErr(null); setMsg(null); }} style={{ ...S.ghost, alignSelf: "center" }}>
            {mode === "in" ? "Ei vielä profiilia? Luo uusi" : "Onko jo profiili? Kirjaudu sisään"}
          </button>
        </div>

        {mode === "in" && known.length > 0 && (
          <div style={{ marginTop: 14 }}>
            <div style={{ fontSize: 11, color: "#6e5f4d", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 6 }}>Tämän selaimen profiilit</div>
            {known.map(k => (
              <div key={k} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 5 }}>
                <button onClick={() => setEmail(k)} style={{
                  flex: 1, textAlign: "left", background: "#211b15", border: `1px solid ${email === k ? "#9c7c34" : "#3a2f22"}`,
                  borderRadius: 8, padding: "8px 10px", color: "#c4b596", fontSize: 13, cursor: "pointer", fontFamily: "inherit",
                }}>{k}</button>
                <button onClick={() => forgetEmail(k)} title="Poista listalta" style={{ background: "none", border: "none", color: "#6e5f4d", fontSize: 14, cursor: "pointer", padding: 6 }}>×</button>
              </div>
            ))}
          </div>
        )}

        <p style={{ fontSize: 11, color: "#6e5f4d", textAlign: "center", marginTop: 16, lineHeight: 1.5 }}>
          Jokaisella profiililla on oma maalausurakkansa ja oma Anthropic-avaimensa.
        </p>
      </div>
    </div>
  );
}

/* ============================================================
   PÄÄNÄKYMÄ
   ============================================================ */
function Tracker({ session, onSignOut }) {
  const userId = session.user.id;
  const [products, setProducts] = useState([]);
  const [profileName, setProfileName] = useState("");
  const [apiKey, setApiKey] = useState("");
  const [loaded, setLoaded] = useState(false);
  const [syncState, setSyncState] = useState("loading");
  const [query, setQuery] = useState("");
  const [searching, setSearching] = useState(false);
  const [searchError, setSearchError] = useState(null);
  const [matches, setMatches] = useState(null);
  const [fetchingId, setFetchingId] = useState(null);
  const [preview, setPreview] = useState(null);
  const [brush, setBrush] = useState(null);
  const [celebrate, setCelebrate] = useState(null);
  const [manualOpen, setManualOpen] = useState(false);
  const [manual, setManual] = useState({ product: "", unit: "", count: 5, system: SYSTEMS[0] });
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [draftKey, setDraftKey] = useState("");
  const [draftName, setDraftName] = useState("");
  const [settingsMsg, setSettingsMsg] = useState(null);
  const skipSave = useRef(true);
  const saveTimer = useRef(null);

  /* ---- lataus ---- */
  useEffect(() => {
    (async () => {
      try {
        const { data, error } = await supa.from("profiles")
          .select("display_name, anthropic_key, data").eq("id", userId).maybeSingle();
        if (error) throw error;
        if (data) {
          setProducts(Array.isArray(data.data) ? data.data : []);
          setProfileName(data.display_name || session.user.email);
          setApiKey(data.anthropic_key || "");
          setDraftKey(data.anthropic_key || "");
          setDraftName(data.display_name || "");
        } else {
          // rivi puuttuu (esim. trigger ei ollut voimassa) — luodaan se
          const fallback = session.user.user_metadata?.display_name || session.user.email.split("@")[0];
          await supa.from("profiles").insert({ id: userId, display_name: fallback, data: [] });
          setProfileName(fallback);
          setDraftName(fallback);
        }
        setSyncState("synced");
      } catch (e) {
        console.error("Lataus epäonnistui", e);
        setSyncState("error");
      }
      skipSave.current = true;
      setLoaded(true);
    })();
  }, [userId]);

  /* ---- tallennus (debounce) ---- */
  useEffect(() => {
    if (!loaded) return;
    if (skipSave.current) { skipSave.current = false; return; }
    setSyncState("saving");
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      try {
        const { error } = await supa.from("profiles")
          .update({ data: products, updated_at: new Date().toISOString() }).eq("id", userId);
        if (error) throw error;
        setSyncState("synced");
      } catch (e) {
        console.error("Tallennus epäonnistui", e);
        setSyncState("error");
      }
    }, 800);
    return () => clearTimeout(saveTimer.current);
  }, [products, loaded, userId]);

  const saveSettings = async () => {
    setSettingsMsg(null);
    try {
      const { error } = await supa.from("profiles")
        .update({ anthropic_key: draftKey.trim() || null, display_name: draftName.trim() || null, updated_at: new Date().toISOString() })
        .eq("id", userId);
      if (error) throw error;
      setApiKey(draftKey.trim());
      setProfileName(draftName.trim() || session.user.email);
      setSettingsMsg("Tallennettu.");
      setTimeout(() => setSettingsMsg(null), 2500);
    } catch (e) {
      setSettingsMsg("Tallennus epäonnistui.");
    }
  };

  /* ---- tilastot ---- */
  const stats = useMemo(() => {
    let total = 0, sum = 0, done = 0;
    const perStage = [0, 0, 0, 0, 0];
    products.forEach(p => p.units.forEach(u => u.minis.forEach(s => {
      total++; sum += s; perStage[s]++; if (s === 4) done++;
    })));
    return { total, done, pct: total ? Math.round((sum / (total * 4)) * 100) : 0, perStage };
  }, [products]);

  const grouped = useMemo(() => {
    const map = new Map();
    products.forEach(p => {
      const sys = SYSTEMS.includes(p.system) ? p.system : "Muu";
      if (!map.has(sys)) map.set(sys, []);
      map.get(sys).push(p);
    });
    return SYSTEMS.filter(s => map.has(s)).map(s => ({ system: s, items: map.get(s) }));
  }, [products]);

  /* ---- haku ---- */
  const humanError = (e) => {
    if (e.message === "NO_API_KEY") return "Tältä profiililta puuttuu Anthropic API -avain. Lisää se asetuksista (⚙).";
    if (e.message === "BAD_API_KEY") return "API-avain ei kelpaa. Tarkista se asetuksista (⚙).";
    return "Haku epäonnistui. Yritä uudelleen tai lisää tuote käsin.";
  };

  const doSearch = async () => {
    if (!query.trim() || searching) return;
    setSearching(true); setSearchError(null); setMatches(null); setPreview(null);
    try {
      const result = await searchProducts(apiKey, query.trim());
      if (result.found && Array.isArray(result.matches) && result.matches.length) {
        setMatches(result.matches.slice(0, 12).map(m => ({
          id: uid(), product: m.product || "?",
          system: SYSTEMS.includes(m.system) ? m.system : "Muu", faction: m.faction || "",
        })));
      } else setSearchError("Tuotteita ei löytynyt. Kokeile toista hakusanaa tai lisää tuote käsin.");
    } catch (e) { setSearchError(humanError(e)); }
    setSearching(false);
  };

  const pickMatch = async (m) => {
    if (fetchingId) return;
    setFetchingId(m.id); setSearchError(null);
    try {
      const result = await fetchProductContents(apiKey, m.product, m.system);
      if (result.found && Array.isArray(result.units) && result.units.length) {
        setPreview({
          product: m.product, system: m.system, faction: m.faction,
          units: result.units.map(u => ({ name: u.name || "Miniatyyri", count: Math.max(1, Math.min(200, parseInt(u.count) || 1)) })),
        });
        setMatches(null);
      } else setSearchError(`Tuotteen "${m.product}" sisältöä ei saatu selville. Voit lisätä sen käsin.`);
    } catch (e) { setSearchError(humanError(e)); }
    setFetchingId(null);
  };

  const addPreview = () => {
    if (!preview) return;
    setProducts(prev => [{
      id: uid(), name: preview.product, faction: preview.faction, system: preview.system,
      units: preview.units.map(u => ({ id: uid(), name: u.name, minis: Array(u.count).fill(0) })),
    }, ...prev]);
    setPreview(null); setQuery("");
  };

  const addManual = () => {
    if (!manual.product.trim() || !manual.unit.trim()) return;
    const count = Math.max(1, Math.min(200, parseInt(manual.count) || 1));
    setProducts(prev => [{
      id: uid(), name: manual.product.trim(), faction: "", system: manual.system,
      units: [{ id: uid(), name: manual.unit.trim(), minis: Array(count).fill(0) }],
    }, ...prev]);
    setManual({ product: "", unit: "", count: 5, system: manual.system });
    setManualOpen(false);
  };

  const setMini = (pid, unitId, idx) => {
    setProducts(prev => {
      let completed = null;
      const next = prev.map(p => {
        if (p.id !== pid) return p;
        const wasDone = p.units.every(u => u.minis.every(s => s === 4));
        const np = { ...p, units: p.units.map(u => {
          if (u.id !== unitId) return u;
          const minis = [...u.minis];
          minis[idx] = brush === null ? (minis[idx] + 1) % 5 : brush;
          return { ...u, minis };
        }) };
        const isDone = np.units.every(u => u.minis.every(s => s === 4));
        if (isDone && !wasDone && np.units.some(u => u.minis.length)) completed = np.name;
        return np;
      });
      if (completed) { setCelebrate(completed); setTimeout(() => setCelebrate(null), 4000); }
      return next;
    });
  };

  const setAllInUnit = (pid, unitId, stage) => setProducts(prev => prev.map(p => p.id !== pid ? p : {
    ...p, units: p.units.map(u => u.id !== unitId ? u : { ...u, minis: u.minis.map(() => stage) }),
  }));

  const setSystem = (pid, system) => setProducts(prev => prev.map(p => (p.id === pid ? { ...p, system } : p)));

  const removeProduct = (pid) => {
    if (!window.confirm("Poistetaanko tuote ja sen miniatyyrit seurannasta?")) return;
    setProducts(prev => prev.filter(p => p.id !== pid));
  };

  const syncLabel = {
    loading: { txt: "Ladataan…", color: "#a89a83" },
    synced:  { txt: "● Tallennettu", color: "#8fae7a" },
    saving:  { txt: "● Tallennetaan…", color: "#d9b34b" },
    error:   { txt: "● Tallennus ei onnistu — tarkista yhteys", color: "#d98a8a" },
  }[syncState];

  /* ============================ UI ============================ */
  return (
    <div style={{ minHeight: "100vh", background: "#17130f", color: "#d9d2c5", fontFamily: "'Alegreya Sans', system-ui, sans-serif" }}>
      {celebrate && (
        <div style={{
          position: "fixed", top: 12, left: "50%", transform: "translateX(-50%)", zIndex: 50,
          background: "linear-gradient(135deg,#7a5c1e,#b9903a)", border: "1px solid #e8c56a",
          borderRadius: 10, padding: "10px 18px", color: "#fff8e6", fontWeight: 700,
          animation: "bannerdrop .35s ease both", boxShadow: "0 6px 24px rgba(0,0,0,.5)", maxWidth: "90vw", textAlign: "center",
        }}>🏆 {celebrate} — kokonaan valmis!</div>
      )}

      <div style={{ maxWidth: 760, margin: "0 auto", padding: "16px 14px 60px" }}>

        {/* ---------- PROFIILIPALKKI ---------- */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, minWidth: 0 }}>
            <div style={{
              width: 30, height: 30, borderRadius: "50%", flexShrink: 0,
              background: "linear-gradient(135deg,#7a5c1e,#9c7c34)", border: "1px solid #e8c56a",
              display: "flex", alignItems: "center", justifyContent: "center",
              fontFamily: "'Cinzel', serif", fontWeight: 700, color: "#fff8e6", fontSize: 13,
            }}>{(profileName || "?").charAt(0).toUpperCase()}</div>
            <span style={{ fontSize: 14, color: "#c4b596", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{profileName}</span>
          </div>
          <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
            <button onClick={() => setSettingsOpen(v => !v)} aria-label="Asetukset" style={{
              background: settingsOpen ? "#3a2f22" : "none", border: "1px solid #3a2f22", borderRadius: 8,
              color: "#9c7c34", fontSize: 15, padding: "5px 10px", cursor: "pointer",
            }}>⚙</button>
            <button onClick={onSignOut} style={{
              background: "none", border: "1px solid #3a2f22", borderRadius: 8,
              color: "#8a7c66", fontSize: 13, padding: "5px 10px", cursor: "pointer", fontFamily: "inherit",
            }}>Kirjaudu ulos</button>
          </div>
        </div>

        {/* ---------- OTSAKE ---------- */}
        <header style={{ textAlign: "center", marginBottom: 4 }}>
          <div style={{ fontFamily: "'Cinzel', serif", fontSize: 12, letterSpacing: "0.35em", color: "#9c7c34", textTransform: "uppercase" }}>Maalausurakka</div>
          <h1 style={{ fontFamily: "'Cinzel', serif", fontSize: 28, fontWeight: 700, color: "#efe6d3", margin: "2px 0 0", lineHeight: 1.15 }}>
            Harmaasta legioonasta<br />kultaiseen armeijaan
          </h1>
        </header>
        <div style={{ textAlign: "center", fontSize: 12, color: syncLabel.color, marginBottom: 14 }}>{syncLabel.txt}</div>

        {/* ---------- ASETUKSET ---------- */}
        {settingsOpen && (
          <section className="card-in" style={{ background: "#211b15", border: "1px solid #4a3c28", borderRadius: 12, padding: 14, marginBottom: 16 }}>
            <h2 style={{ fontFamily: "'Cinzel', serif", fontSize: 15, margin: "0 0 10px", color: "#c9a554" }}>Profiilin asetukset</h2>
            <label style={{ fontSize: 13, color: "#a89a83", display: "block", marginBottom: 4 }}>Profiilin nimi</label>
            <input value={draftName} onChange={e => setDraftName(e.target.value)} style={{ ...S.input, marginBottom: 12 }} />
            <label style={{ fontSize: 13, color: "#a89a83", display: "block", marginBottom: 4 }}>Anthropic API -avain (tuotehakua varten)</label>
            <input type="password" value={draftKey} onChange={e => setDraftKey(e.target.value)} placeholder="sk-ant-…" style={S.input} />
            <p style={{ fontSize: 12, color: "#8a7c66", margin: "6px 0 10px", lineHeight: 1.5 }}>
              Avain on profiilikohtainen ja tallentuu Supabaseen omalle riviellesi — vain sinä pääset siihen käsiksi, ja se seuraa mukana laitteelta toiselle.
              Ilman avainta haku ei toimi, mutta käsinlisäys ja seuranta toimivat normaalisti.
            </p>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <button onClick={saveSettings} style={{ background: "#3a2f22", border: "1px solid #5a4930", borderRadius: 8, padding: "9px 14px", color: "#e8c56a", fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                Tallenna
              </button>
              {settingsMsg && <span style={{ fontSize: 13, color: settingsMsg === "Tallennettu." ? "#8fae7a" : "#d98a8a" }}>{settingsMsg}</span>}
            </div>
          </section>
        )}

        {/* ---------- EDISTYMINEN ---------- */}
        <section style={{ background: "#211b15", border: "1px solid #3a2f22", borderRadius: 12, padding: 16, marginBottom: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>
            <span style={{ fontFamily: "'Cinzel', serif", fontSize: 34, color: "#e8c56a", fontWeight: 700 }}>{stats.pct}%</span>
            <span style={{ fontSize: 14, color: "#a89a83" }}>{stats.done} / {stats.total} miniä valmiina</span>
          </div>
          <div style={{ display: "flex", height: 14, borderRadius: 7, overflow: "hidden", background: "#2c251c", border: "1px solid #3a2f22" }}>
            {STAGES.map(st => stats.perStage[st.key] > 0 && stats.total > 0 ? (
              <div key={st.key} title={st.name} style={{
                width: `${(stats.perStage[st.key] / stats.total) * 100}%`,
                background: st.key === 0 ? "transparent" : st.color, opacity: st.key === 0 ? 0 : 0.9,
              }} />
            ) : null)}
          </div>
          <p style={{ margin: "10px 0 0", fontSize: 14, color: "#c4b596", fontStyle: "italic" }}>
            {motivationLine(stats.pct, stats.total, stats.done)}
          </p>
        </section>

        {/* ---------- HAKU ---------- */}
        <section style={{ marginBottom: 16 }}>
          <div style={{ display: "flex", gap: 8 }}>
            <input value={query} onChange={e => setQuery(e.target.value)} onKeyDown={e => e.key === "Enter" && doSearch()}
              placeholder="Hae tuotteita, esim. 'High Elf' tai 'Combat Patrol'…"
              style={{ ...S.input, flex: 1, background: "#211b15", borderRadius: 10, padding: "12px 14px" }} />
            <button onClick={doSearch} disabled={searching} style={{
              background: searching ? "#4a3c28" : "linear-gradient(135deg,#8c2f2f,#6e2020)",
              color: "#f5e9d0", border: "1px solid #a54040", borderRadius: 10,
              padding: "0 18px", fontWeight: 700, fontSize: 15, cursor: searching ? "wait" : "pointer", fontFamily: "inherit", flexShrink: 0,
            }}>{searching ? "Haetaan…" : "Hae"}</button>
          </div>

          <button onClick={() => setManualOpen(v => !v)} style={{ ...S.ghost, marginTop: 6 }}>
            {manualOpen ? "Sulje käsinlisäys" : "Tai lisää tuote käsin"}
          </button>

          {manualOpen && (
            <div className="card-in" style={{ background: "#211b15", border: "1px solid #3a2f22", borderRadius: 10, padding: 12, marginTop: 6, display: "flex", flexDirection: "column", gap: 8 }}>
              <input value={manual.product} onChange={e => setManual({ ...manual, product: e.target.value })} placeholder="Tuotteen nimi" style={S.input} />
              <select value={manual.system} onChange={e => setManual({ ...manual, system: e.target.value })} style={S.input}>
                {SYSTEMS.map(s => <option key={s} value={s}>{s}</option>)}
              </select>
              <div style={{ display: "flex", gap: 8 }}>
                <input value={manual.unit} onChange={e => setManual({ ...manual, unit: e.target.value })} placeholder="Miniatyyrin nimi" style={{ ...S.input, flex: 1 }} />
                <input type="number" min="1" max="200" value={manual.count} onChange={e => setManual({ ...manual, count: e.target.value })} style={{ ...S.input, width: 70, flexShrink: 0 }} />
              </div>
              <button onClick={addManual} style={{ background: "#3a2f22", border: "1px solid #5a4930", borderRadius: 8, padding: "10px", color: "#e8c56a", fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                Lisää urakkaan
              </button>
            </div>
          )}

          {searchError && <p style={{ color: "#d98a8a", fontSize: 14, margin: "8px 0 0" }}>{searchError}</p>}

          {matches && (
            <div className="card-in" style={{ background: "#211b15", border: "1px solid #3a2f22", borderRadius: 12, marginTop: 10, overflow: "hidden" }}>
              <div style={{ padding: "10px 14px", fontSize: 13, color: "#a89a83", borderBottom: "1px solid #3a2f22" }}>
                {matches.length} tuotetta löytyi — valitse lisättävä:
              </div>
              {matches.map(m => (
                <button key={m.id} className="match-row" onClick={() => pickMatch(m)} disabled={!!fetchingId} style={{
                  display: "block", width: "100%", textAlign: "left", background: "transparent", border: "none",
                  borderBottom: "1px solid #2c251c", padding: "11px 14px", fontFamily: "inherit",
                  cursor: fetchingId ? "wait" : "pointer", opacity: fetchingId && fetchingId !== m.id ? 0.4 : 1,
                }}>
                  <div style={{ fontSize: 15, fontWeight: 700, color: "#efe6d3" }}>
                    {fetchingId === m.id ? "⏳ Haetaan sisältöä… " : ""}{m.product}
                  </div>
                  <div style={{ fontSize: 12, color: "#9c7c34" }}>{m.system}{m.faction ? ` · ${m.faction}` : ""}</div>
                </button>
              ))}
              <button onClick={() => setMatches(null)} style={{ display: "block", width: "100%", background: "#1c1712", border: "none", padding: "9px", color: "#8a7c66", fontSize: 13, cursor: "pointer", fontFamily: "inherit" }}>
                Sulje tulokset
              </button>
            </div>
          )}

          {preview && (
            <div className="card-in" style={{ background: "#241d14", border: "1px solid #7a5c1e", borderRadius: 12, padding: 14, marginTop: 10 }}>
              <div style={{ fontFamily: "'Cinzel', serif", fontSize: 17, color: "#efe6d3", fontWeight: 700 }}>{preview.product}</div>
              <div style={{ fontSize: 13, color: "#9c7c34", marginBottom: 8 }}>{preview.system}{preview.faction ? ` · ${preview.faction}` : ""}</div>
              {preview.units.map((u, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "4px 0", fontSize: 14 }}>
                  <input type="number" min="1" max="200" value={u.count} onChange={e => {
                    const units = [...preview.units];
                    units[i] = { ...u, count: Math.max(1, Math.min(200, parseInt(e.target.value) || 1)) };
                    setPreview({ ...preview, units });
                  }} style={{ ...S.input, width: 58, padding: "5px 6px", fontSize: 14, flexShrink: 0 }} />
                  <span>× {u.name}</span>
                </div>
              ))}
              <p style={{ fontSize: 12, color: "#a89a83", margin: "6px 0 10px" }}>Tarkista lukumäärät — tekoälyhaku voi erehtyä. Voit korjata ne tässä.</p>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={addPreview} style={{ ...S.gold, flex: 1 }}>
                  Lisää urakkaan ({preview.units.reduce((a, u) => a + u.count, 0)} miniä)
                </button>
                <button onClick={() => setPreview(null)} style={{ background: "#2c251c", border: "1px solid #4a3c28", borderRadius: 8, padding: "10px 14px", color: "#a89a83", cursor: "pointer", fontFamily: "inherit" }}>
                  Peru
                </button>
              </div>
            </div>
          )}
        </section>

        {/* ---------- SIVELLIN ---------- */}
        {stats.total > 0 && (
          <section style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 12, color: "#a89a83", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.08em" }}>
              Sivellin — valitse mitä napautus tekee minille
            </div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
              <button onClick={() => setBrush(null)} style={{
                background: brush === null ? "#3a2f22" : "#211b15",
                border: `1px solid ${brush === null ? "#e8c56a" : "#3a2f22"}`, borderRadius: 8, padding: "7px 10px",
                color: brush === null ? "#e8c56a" : "#a89a83", fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
              }}>→ Seuraava vaihe</button>
              {STAGES.map(st => (
                <button key={st.key} onClick={() => setBrush(st.key)} style={{
                  background: brush === st.key ? st.bg : "#211b15",
                  border: `1px solid ${brush === st.key ? st.color : "#3a2f22"}`, borderRadius: 8, padding: "7px 10px",
                  color: brush === st.key ? st.color : "#a89a83", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
                }}>{st.name}</button>
              ))}
            </div>
          </section>
        )}

        {/* ---------- TYHJÄ TILA ---------- */}
        {loaded && products.length === 0 && (
          <div style={{ textAlign: "center", padding: "40px 20px", color: "#8a7c66" }}>
            <div style={{ fontSize: 40, marginBottom: 8 }}>🎨</div>
            <p style={{ margin: 0, fontSize: 15 }}>Urakka on tyhjä. Hae ensimmäinen tuote yltä —<br />esim. "High Elf" tai "Combat Patrol Tyranids".</p>
          </div>
        )}

        {/* ---------- TUOTTEET KATEGORIOITTAIN ---------- */}
        {grouped.map(({ system, items }) => {
          const cTotal = items.reduce((a, p) => a + p.units.reduce((x, u) => x + u.minis.length, 0), 0);
          const cSum = items.reduce((a, p) => a + p.units.reduce((x, u) => x + u.minis.reduce((y, s) => y + s, 0), 0), 0);
          const cPct = cTotal ? Math.round((cSum / (cTotal * 4)) * 100) : 0;
          return (
            <section key={system} style={{ marginBottom: 24 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", borderBottom: "1px solid #4a3c28", paddingBottom: 6, marginBottom: 12 }}>
                <h2 style={{ fontFamily: "'Cinzel', serif", fontSize: 16, margin: 0, color: "#c9a554", letterSpacing: "0.06em", textTransform: "uppercase" }}>{system}</h2>
                <span style={{ fontSize: 13, color: "#a89a83" }}>{cPct}% · {cTotal} miniä</span>
              </div>

              {items.map(p => {
                const pTotal = p.units.reduce((a, u) => a + u.minis.length, 0);
                const pSum = p.units.reduce((a, u) => a + u.minis.reduce((x, s) => x + s, 0), 0);
                const pPct = pTotal ? Math.round((pSum / (pTotal * 4)) * 100) : 0;
                const pDoneAll = pPct === 100 && pTotal > 0;
                return (
                  <article key={p.id} className="card-in" style={{
                    background: "#211b15", border: `1px solid ${pDoneAll ? "#7a5c1e" : "#3a2f22"}`,
                    borderRadius: 12, padding: 14, marginBottom: 14,
                    animation: pDoneAll ? "goldpulse 2.5s ease infinite" : undefined,
                  }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
                      <div style={{ minWidth: 0 }}>
                        <h3 style={{ fontFamily: "'Cinzel', serif", fontSize: 17, margin: 0, color: pDoneAll ? "#e8c56a" : "#efe6d3" }}>
                          {pDoneAll && "★ "}{p.name}
                        </h3>
                        {p.faction && <div style={{ fontSize: 12, color: "#9c7c34" }}>{p.faction}</div>}
                      </div>
                      <div style={{ fontFamily: "'Cinzel', serif", fontSize: 20, fontWeight: 700, color: pDoneAll ? "#e8c56a" : "#c4b596", flexShrink: 0 }}>{pPct}%</div>
                    </div>

                    {p.units.map(u => {
                      const uDone = u.minis.filter(s => s === 4).length;
                      return (
                        <div key={u.id} style={{ marginTop: 12 }}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6, gap: 8, flexWrap: "wrap" }}>
                            <span style={{ fontSize: 14, fontWeight: 700, color: "#d9d2c5" }}>
                              {u.name} <span style={{ color: "#8a7c66", fontWeight: 400 }}>({uDone}/{u.minis.length} valmis)</span>
                            </span>
                            <button onClick={() => setAllInUnit(p.id, u.id, brush === null ? Math.min(4, Math.min(...u.minis) + 1) : brush)}
                              style={{ background: "#2c251c", border: "1px solid #4a3c28", borderRadius: 6, padding: "4px 8px", color: "#c4b596", fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>
                              Sivele kaikki
                            </button>
                          </div>
                          <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                            {u.minis.map((s, i) => {
                              const st = STAGES[s];
                              return (
                                <button key={i} className="mini-chip" onClick={() => setMini(p.id, u.id, i)}
                                  aria-label={`${u.name} #${i + 1}: ${st.name}`} title={`#${i + 1}: ${st.name} — ${st.desc}`}
                                  style={{
                                    width: 34, height: 34, borderRadius: "50%", background: st.bg,
                                    border: `2px solid ${st.color}`, color: st.color, fontSize: 10, fontWeight: 700,
                                    display: "flex", alignItems: "center", justifyContent: "center",
                                    boxShadow: s === 4 ? "0 0 6px rgba(232,197,106,.5)" : "none",
                                  }}>
                                  {s === 4 ? "★" : st.short}
                                </button>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })}

                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 12, gap: 8 }}>
                      <select value={SYSTEMS.includes(p.system) ? p.system : "Muu"} onChange={e => setSystem(p.id, e.target.value)}
                        style={{ background: "#17130f", border: "1px solid #3a2f22", borderRadius: 6, padding: "5px 8px", color: "#8a7c66", fontSize: 12, fontFamily: "inherit" }}>
                        {SYSTEMS.map(s => <option key={s} value={s}>{s}</option>)}
                      </select>
                      <button onClick={() => removeProduct(p.id)} style={{ background: "none", border: "none", color: "#6e5f4d", fontSize: 12, cursor: "pointer", padding: 2, textDecoration: "underline", fontFamily: "inherit" }}>
                        poista tuote
                      </button>
                    </div>
                  </article>
                );
              })}
            </section>
          );
        })}

        {/* ---------- SELITE ---------- */}
        {stats.total > 0 && (
          <footer style={{ marginTop: 20, borderTop: "1px solid #3a2f22", paddingTop: 12 }}>
            <div style={{ display: "flex", flexWrap: "wrap", gap: "6px 14px", fontSize: 12, color: "#a89a83" }}>
              {STAGES.map(st => (
                <span key={st.key} style={{ display: "flex", alignItems: "center", gap: 5 }}>
                  <span style={{ width: 14, height: 14, borderRadius: "50%", background: st.bg, border: `2px solid ${st.color}`, display: "inline-block" }} />
                  {st.short} = {st.name}
                </span>
              ))}
            </div>
          </footer>
        )}
      </div>
    </div>
  );
}

/* ============================================================
   JUURI — istunnon hallinta
   ============================================================ */
function App() {
  const [session, setSession] = useState(null);
  const [ready, setReady] = useState(false);

  useEffect(() => {
    if (!supa) { setReady(true); return; }
    supa.auth.getSession().then(({ data }) => {
      setSession(data.session);
      setReady(true);
    });
    const { data: sub } = supa.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => sub.subscription.unsubscribe();
  }, []);

  const center = { minHeight: "100vh", background: "#17130f", color: "#a89a83", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Alegreya Sans', system-ui, sans-serif", padding: 20, textAlign: "center" };

  if (!supa) return (
    <div style={center}>
      <div>
        <h1 style={{ fontFamily: "'Cinzel', serif", color: "#e8c56a", fontSize: 20 }}>Asetukset puuttuvat</h1>
        <p style={{ maxWidth: 380, lineHeight: 1.6, fontSize: 14 }}>
          Täytä <code style={{ color: "#c9a554" }}>SUPABASE_URL</code> ja <code style={{ color: "#c9a554" }}>SUPABASE_ANON_KEY</code> tiedoston <code style={{ color: "#c9a554" }}>index.html</code> alusta, ja aja <code style={{ color: "#c9a554" }}>supabase-setup.sql</code> Supabasen SQL Editorissa.
        </p>
      </div>
    </div>
  );

  if (!ready) return <div style={center}>Ladataan…</div>;
  if (!session) return <AuthScreen />;
  return <Tracker key={session.user.id} session={session} onSignOut={() => supa.auth.signOut()} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
